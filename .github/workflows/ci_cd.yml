name: CI/CD - TPA Admin API

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

env:
  IMAGE_NAME: tpa-admin-pungsu-api
  DEPLOY_PATH: /home/nex3/app/tpa-admin-pungsu-api

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Source
        uses: actions/checkout@v6

      - name: Determine Environment
        id: env
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "target=prod" >> $GITHUB_OUTPUT
          else
            echo "target=dev" >> $GITHUB_OUTPUT
          fi

      - name: Docker Image Build
        run: |
          echo "🐳 Build Docker Images"
          docker build \
            --network=host \
            -t ${{ env.IMAGE_NAME }}:${{ steps.env.outputs.target }} -f Dockerfile .

      - name: Prepare & Execute Deployment
        run: |
          mkdir -p ${{ env.DEPLOY_PATH }}
          
          # [수정 포인트] 파일 경로가 scripts/deploy.sh 인지 확인하세요.
          cp docker-compose.yml ${{ env.DEPLOY_PATH }}/
          cp scripts/deploy.sh ${{ env.DEPLOY_PATH }}/
          chmod +x ${{ env.DEPLOY_PATH }}/deploy.sh
          
          # 배포 스크립트 실행
          cd ${{ env.DEPLOY_PATH }}
          ./deploy.sh ${{ steps.env.outputs.target }}

      - name: Cleanup Docker
        run: docker image prune -f