 # 1. CORS 설정을 위한 Map
    map $http_origin $cors_origin {
        default "";
        "http://localhost:3000" "$http_origin";
        "https://admin.tpa.nexsol.ai" "$http_origin";
        "https://manage.tpakorea.com" "$http_origin";
        "https://dev-admin.tpa.nexsol.ai" "$http_origin";
    }

    # 2. HTTP (80 포트) 서버 블록
    # - 내부 서비스간 통신 (Gateway -> Nginx)
    # - 외부 HTTP 요청을 HTTPS로 리다이렉트
    server {
        listen 80;
        server_name admin-tpa.server.nexsol.ai;

        # [내부 통신] Pungsu 서비스
        location /upstream/pungsu/ {
            proxy_pass http://127.0.0.1:8104/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # 접근 제어 (내부 IP만 허용)
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            allow 172.17.0.0/16;

            allow 192.168.0.0/16;
            deny all;
        }


# ========================================================
    # [추가] 여행자 서비스 (PROD)
    # GatewayConfig: .prefixPath("/upstream/travel")
    # ========================================================
    location /upstream/travel/ {
        # deploy.sh가 배포 시 이 포트(8103<->8104)를 변경함
        proxy_pass http://127.0.0.1:8203/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # 접근 제어 (유지)
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        allow 172.17.0.0/16;
        allow 192.168.0.0/16;
        deny all;
    }

       # [내부 통신] Memo 서비스
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # 접근 제어 (내부 IP만 허용)
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            allow 172.17.0.0/16;
            allow 192.168.0.0/16;
            deny all;
        }

        # [헬스체크]
        location /health {
            access_log off;
            return 200 'OK';
        location / {
            if ($host = "host.docker.internal") {
                return 404;
            }
            return 301 https://$host$request_uri;
        }
        server_name admin-tpa.server.nexsol.ai;
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;


       # login intercepter
                # 중요: Authorization 헤더 허용 명시
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Length' 0;
                return 204;
            }


            # SSE 필수 헤더
            proxy_set_header Connection '';

            # 타임아웃 설정 (20분 = 1200초)
            proxy_read_timeout 1200s;
            proxy_send_timeout 1200s;

            # Host 및 IP 헤더 전달
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_hide_header 'Access-Control-Allow-Origin';
        }
        location /admin/ {
           # backend 중복 header 방지
           proxy_hide_header 'Access-Control-Allow-Origin';

            # Preflight 요청 처리
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Length' 0;
                return 204;
            }
            proxy_pass http://127.0.0.1:8095/v1/admin/;

        # Public API 라우팅 (인증 없음 - 사용자용 공개 API)
        location /public/ {
           proxy_hide_header 'Access-Control-Allow-Origin';
           proxy_hide_header 'Access-Control-Allow-Credentials';
           proxy_hide_header 'Access-Control-Allow-Methods';
           proxy_hide_header 'Access-Control-Allow-Headers';


            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Length' 0;
                return 204;
            }

            proxy_pass http://127.0.0.1:8095/v1/public/;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarde
d_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Actuator 라우팅
        location /v1/admin/actuator/ {
            proxy_pass http://127.0.0.1:8095/v1/admin/actuator/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 기본 404 처리
        location / {
            return 404;
        }
    }